[build]
  command = "pnpm run build"
  publish = "apps/web/.next"
  functions = "apps/web/.next/server/app"

[build.environment]
  NODE_VERSION = "22.22.2"
  NPM_FLAGS = "--legacy-peer-deps"
  NEXT_TELEMETRY_DISABLED = "1"

[context.production]
  command = "pnpm run build"

[context.deploy-preview]
  command = "pnpm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

